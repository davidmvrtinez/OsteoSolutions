    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:10px;border:none;cursor:pointer;font-size:15px;font-weight:600;transition:all .15s;width:100%}
    .btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}

    label{display:block;font-size:13px;font-weight:600;color:#4b5563;margin-bottom:5px}
    .tabs{display:flex;gap:3px;background:#e2e8f0;padding:4px;border-radius:10px;margin-bottom:18px}
    .tab{flex:1;padding:10px 4px;text-align:center;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;color:#6b7280;transition:all .15s;white-space:nowrap}

    .badge-red{background:#fee2e2;color:#dc2626}
    .badge-yellow{background:#fef3c7;color:#d97706}
    .badge-green{background:#dcfce7;color:#16a34a}
    .badge-blue{background:#dbeafe;color:#2563eb}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:10px 12px;background:#f8fafc;border-bottom:2px solid #e2e8f0;font-weight:700;color:#374151}
    td{padding:10px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
    tr:hover td{background:#fafbff}
    .sync-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:16px;font-size:13px}
    .sync-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .sync-dot.ok{background:#22c55e}
    .sync-dot.pending{background:#f59e0b;animation:pulse .8s infinite alternate}
    .sync-dot.error{background:#ef4444}
    @keyframes pulse{from{opacity:.4}to{opacity:1}}

    .empty{text-align:center;padding:40px;color:#94a3b8}
    .search-row{display:flex;gap:8px;margin-bottom:16px}
    .search-row input{flex:1}
    .product-name{font-size:12px;color:#2563eb;font-weight:600}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .alert{padding:12px 16px;border-radius:9px;font-size:13px;margin-bottom:12px;line-height:1.5}
    .alert-red{background:#fee2e2;color:#991b1b}
    .alert-yellow{background:#fffbeb;color:#92400e}
    .alert-green{background:#f0fdf4;color:#166534}
    .alert-blue{background:#eff6ff;color:#1e40af}

    .login-wrap p{font-size:14px;color:#6b7280;max-width:400px;margin:0 auto 28px;line-height:1.6}
    .bin-header{padding:12px 16px;background:#1e40af;color:#fff;font-weight:700;border-radius:8px 8px 0 0;display:flex;justify-content:space-between;align-items:center}
    .bin-body{border:1.5px solid #e2e8f0;border-top:none;border-radius:0 0 8px 8px;margin-bottom:14px;overflow:hidden}

async function getToken() {
  const client = getMsal();
  await client.initialize();
  const accounts = client.getAllAccounts();
  if (accounts.length === 0) return null;
  try {
    const res = await client.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
    return res.accessToken;
  } catch {
    return null;
  }
}

  const client = getMsal();
  await client.initialize();
  await client.loginPopup({ scopes: SCOPES });
  return await getToken();
}

  const client = getMsal();
  await client.initialize();
  const accounts = client.getAllAccounts();
  if (accounts[0]) await client.logoutPopup({ account: accounts[0] });

// ── OneDrive helpers ─────────────────────────────────────────────────────────
async function readOneDrive(token) {
  const r = await fetch(`${GRAPH}/me/drive/root:/${FILE_PATH}:/content`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  if (r.status === 404) return null;
  if (!r.ok) throw new Error(`OneDrive read error ${r.status}`);
  return await r.json();
}

async function writeOneDrive(token, data) {
  const r = await fetch(`${GRAPH}/me/drive/root:/${FILE_PATH}:/content`, {
    method: "PUT",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify(data, null, 2)
  });
  if (!r.ok) throw new Error(`OneDrive write error ${r.status}`);
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function parseBarcode(raw) {
  let gtin14 = '', lotNumber = '', expDate = null;

  // Normalize: replace FNC1/GS control characters (0x1D etc.) with a pipe delimiter
  const norm = raw.replace(/[\x1d\x1c\x1e\x1f\x04]/g, '|');

  // Format 1: Human-readable with parentheses e.g. "(01)00190446138013(17)250523(10)321C"
  if (norm.includes('(01)') || norm.includes('(17)') || norm.includes('(10)')) {
    const m01 = norm.match(/\(01\)\s*([\d\s]{14,17})/);
    const m17 = norm.match(/\(17\)\s*(\d{6})/);
    const m10 = norm.match(/\(10\)\s*([^(|\n]+)/);
    if (m01) gtin14 = m01[1].replace(/\s/g,'').slice(0,14);
    if (m17) { const d=m17[1]; expDate=`20${d.slice(0,2)}-${d.slice(2,4)}-${d.slice(4,6)}`; }
    if (m10) lotNumber = m10[1].trim();
    if (gtin14 || lotNumber) return { gtin14, lotNumber, expDate };
  }

  // Format 2: Raw GS1-128 without parentheses e.g. "010019044613801317250523|10321C1D0108"
  // Split on FNC1 separators and parse each segment sequentially
  const segments = norm.split('|');
  for (const seg of segments) {
    let i = 0;
    while (i < seg.length) {
      const rest = seg.slice(i);
      // AI 01 - GTIN, fixed 14 digits
      if (rest.startsWith('01') && /^\d{14}/.test(rest.slice(2,16))) {
        if (!gtin14) gtin14 = rest.slice(2,16);
        i += 16; continue;
      }
      // AI 17 - Expiry YYMMDD, fixed 6 digits
      if (rest.startsWith('17') && /^\d{6}/.test(rest.slice(2,8))) {
        if (!expDate) { const d=rest.slice(2,8); expDate=`20${d.slice(0,2)}-${d.slice(2,4)}-${d.slice(4,6)}`; }
        i += 8; continue;
      }
      // AI 11/13/15/16 - other date fields, fixed 6 digits, skip
      if (/^(11|13|15|16)/.test(rest) && /^\d{6}/.test(rest.slice(2,8))) { i += 8; continue; }
      // AI 10 - Lot, variable length to end of segment
      if (rest.startsWith('10')) { if (!lotNumber) lotNumber = rest.slice(2).trim(); break; }
      // AI 21 - Serial, variable length, skip
      if (rest.startsWith('21')) { break; }
      // Unknown - advance one char to avoid infinite loop
      i++;
    }
  }

  return { gtin14, lotNumber, expDate };
}

// Try several key formats against CATALOG to handle different GS1 structures
function lookupProduct(gtin14) {
  if (!gtin14) return { productNumber: '', productName: '' };
  const stripped = gtin14.replace(/^0+/, '');           // remove all leading zeros
  const noCheck  = stripped.slice(0, -1);               // drop GS1 check digit
  const noCheckFull = gtin14.slice(0, -1).replace(/^0+/, '');
  for (const key of [gtin14, stripped, noCheck, noCheckFull]) {
    if (key && CATALOG[key]) return { productNumber: key, productName: CATALOG[key] };
  }
  // Not in catalog - use stripped number as productNumber, productName empty
  return { productNumber: noCheck || stripped || gtin14, productName: '' };
}
function daysUntil(d) { return d ? Math.ceil((new Date(d) - new Date()) / 86400000) : null; }
function fmtDate(d) { if (!d) return '—'; const [y,m,dd] = d.split('-'); return `${m}/${dd}/${y}`; }
function ExpiryBadge({ d }) {
  const days = daysUntil(d); if (days === null) return null;
  if (days < 0) return <span className="badge badge-red">EXPIRED</span>;
  if (days <= 30) return <span className="badge badge-red">{days}d</span>;
  if (days <= 90) return <span className="badge badge-yellow">{days}d</span>;
  return <span className="badge badge-green">{days}d</span>;
}

// ── Barcode Scanner — ZXing (works on iOS Safari, Android, all browsers) ──────
function BarcodeScanner({ bin, onAdd, onClose }) {
  const videoRef   = useRef(null);
  const readerRef  = useRef(null);
  const controlRef = useRef(null);
  const cooldown   = useRef(false);
  const lastCode   = useRef('');
  const [scanned,     setScanned]     = useState([]);
  const [pending,     setPending]     = useState(null);   // item awaiting confirmation
  const [pendingRef,  setPendingRef]  = useState('');
  const [pendingLot,  setPendingLot]  = useState('');
  const [pendingExp,  setPendingExp]  = useState('');
  const [camError,    setCamError]    = useState('');
  const [ready,       setReady]       = useState(false);
  const [addedFlash,  setAddedFlash]  = useState(false);

  useEffect(() => {
    let active = true;

    (async () => {
      try {
        const hints = new Map();
        const fmts = ZXing && ZXing.BarcodeFormat ? [
          ZXing.BarcodeFormat.CODE_128,
          ZXing.BarcodeFormat.CODE_39,
          ZXing.BarcodeFormat.EAN_13,
          ZXing.BarcodeFormat.EAN_8,
          ZXing.BarcodeFormat.UPC_A,
          ZXing.BarcodeFormat.UPC_E,
          ZXing.BarcodeFormat.QR_CODE,
          ZXing.BarcodeFormat.DATA_MATRIX,
        ] : [];
        if (fmts.length) hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, fmts);
        if (ZXing && ZXing.DecodeHintType) hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

        const reader = new ZXing.BrowserMultiFormatReader(hints);
        readerRef.current = reader;
        if (!active) return;

        const controls = await reader.decodeFromConstraints(
          { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } },
          videoRef.current,
          (result, err) => {
            if (!active || !result) return;
            const raw = result.getText();
            if (!raw || raw === lastCode.current || cooldown.current) return;

            lastCode.current = raw;
            cooldown.current = true;
            // Keep cooldown active while review card is shown; reset when dismissed
            try { navigator.vibrate && navigator.vibrate([100]); } catch(_) {}

            const p = parseBarcode(raw);
            const looked = lookupProduct(p.gtin14);
            const item = {
              id: Date.now() + Math.random(),
              productNumber: looked.productNumber || p.gtin14 || raw.trim(),
              productName: looked.productName || (p.gtin14 ? 'GTIN: ' + p.gtin14 : raw.trim()),
              lot: p.lotNumber,
              expDate: p.expDate || null,
              bin: bin || '',
              qty: 1,
              addedAt: new Date().toISOString()
            };
            // Show review card — don't add yet
            setPending(item);
            setPendingRef(item.productNumber);
            setPendingLot(item.lot || '');
            setPendingExp(item.expDate || '');
          }
        );
        controlRef.current = controls;
        if (active) setReady(true);

      } catch (err) {
        if (!active) return;
        if (err && (err.name === 'NotAllowedError' || String(err).includes('Permission'))) {
          setCamError('Camera permission denied.\n\niPhone: Settings \u2192 Safari \u2192 Camera \u2192 Allow\n\nThen reopen the scanner.');
        } else {
          setCamError('Could not open camera: ' + (err && err.message ? err.message : String(err)));
        }
      }
    })();

    return () => {
      active = false;
      try { if (controlRef.current) controlRef.current.stop(); } catch(_) {}
      try { if (readerRef.current) readerRef.current.reset(); } catch(_) {}
    };
  }, []);

  function confirmAdd() {
    if (!pending) return;
    const confirmed = {
      ...pending,
      productNumber: pendingRef || pending.productNumber,
      lot: pendingLot || pending.lot,
      expDate: pendingExp || pending.expDate,
    };
    onAdd(confirmed);
    setScanned(prev => [confirmed, ...prev.slice(0, 49)]);
    setPending(null);
    setPendingRef(''); setPendingLot(''); setPendingExp('');
    cooldown.current = false; lastCode.current = '';
    setAddedFlash(true);
    setTimeout(() => setAddedFlash(false), 1800);
  }

  function dismissPending() {
    setPending(null);
    setPendingRef(''); setPendingLot(''); setPendingExp('');
    cooldown.current = false; lastCode.current = '';
  }

  const handleDone = () => {
    try { if (controlRef.current) controlRef.current.stop(); } catch(_) {}
    try { if (readerRef.current) readerRef.current.reset(); } catch(_) {}
    onClose();
  };

  return (
    <div className="scanner-overlay">
      <div style={{width:'100%',maxWidth:500,paddingTop:8,display:'flex',flexDirection:'column',gap:12}}>

        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{lineHeight:1.3}}>
            <div style={{fontSize:11,color:'#94a3b8',fontWeight:700,textTransform:'uppercase',letterSpacing:.8}}>Scanning into</div>
            <div style={{fontSize:22,fontWeight:800,color:'#86efac'}}>{bin||'(no bin)'}</div>
          </div>
          <button onClick={handleDone} style={{background:'#fff',color:'#1e40af',border:'none',borderRadius:10,padding:'13px 28px',fontWeight:800,cursor:'pointer',fontSize:16}}>{'\u2713'} Done</button>
        </div>

        {/* Camera */}
        <div style={{borderRadius:14,overflow:'hidden',background:'#111',position:'relative',minHeight:200}}>
          <video ref={videoRef} playsInline muted style={{width:'100%',display:'block',maxHeight:340,objectFit:'cover'}}/>
          {ready && !camError && (
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
              <div style={{
                width:'88%', height:88,
                border:`3px solid ${pending ? '#22c55e' : addedFlash ? '#22c55e' : 'rgba(255,255,255,.5)'}`,
                borderRadius:10,
                boxShadow: (pending||addedFlash) ? '0 0 0 5px rgba(34,197,94,.3)' : 'none',
                transition:'border-color .1s, box-shadow .1s'
              }}/>
            </div>
          )}
          {!ready && !camError && (
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:'#64748b',fontSize:14}}>Starting camera\u2026</div>
          )}
          {camError && (
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',padding:20,color:'#fca5a5',fontSize:13,lineHeight:1.7,textAlign:'center',whiteSpace:'pre-line'}}>{camError}</div>
          )}
        </div>

        {/* ── Review card: shown after scan, before confirm ── */}
        {pending && (
          <div style={{background:'#1e3a5f',borderRadius:14,padding:16,animation:'flashIn .2s ease-out',border:'2px solid #22c55e'}}>
            <div style={{color:'#86efac',fontSize:12,fontWeight:800,letterSpacing:1,marginBottom:12}}>BARCODE DETECTED \u2014 REVIEW &amp; CONFIRM</div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
              <div>
                <div style={{color:'#94a3b8',fontSize:11,fontWeight:700,marginBottom:4}}>REF</div>
                <input
                  value={pendingRef}
                  onChange={e=>setPendingRef(e.target.value)}
                  style={{background:'#0f2744',border:'1.5px solid #334155',borderRadius:8,padding:'9px 11px',color:'#f1f5f9',fontSize:14,fontWeight:700,width:'100%'}}
                />
              </div>
              <div>
                <div style={{color:'#94a3b8',fontSize:11,fontWeight:700,marginBottom:4}}>LOT</div>
                <input
                  value={pendingLot}
                  onChange={e=>setPendingLot(e.target.value)}
                  style={{background:'#0f2744',border:'1.5px solid #334155',borderRadius:8,padding:'9px 11px',color:'#f1f5f9',fontSize:14,fontWeight:700,width:'100%'}}
                />
              </div>
            </div>

            <div style={{marginBottom:14}}>
              <div style={{color:'#94a3b8',fontSize:11,fontWeight:700,marginBottom:4}}>EXPIRY DATE</div>
              <input
                type="date"
                value={pendingExp}
                onChange={e=>setPendingExp(e.target.value)}
                style={{background:'#0f2744',border:'1.5px solid #334155',borderRadius:8,padding:'9px 11px',color:'#f1f5f9',fontSize:14,fontWeight:700,width:'100%'}}
              />
            </div>

            {pending.productName && !pending.productName.startsWith('GTIN:') && (
              <div style={{color:'#7dd3fc',fontSize:12,marginBottom:12}}>{pending.productName}</div>
            )}

            <div style={{display:'flex',gap:10}}>
              <button
                onClick={confirmAdd}
                style={{flex:2,background:'#16a34a',color:'#fff',border:'none',borderRadius:10,padding:'13px',fontWeight:800,fontSize:15,cursor:'pointer'}}
              >
                \u2713 Add to {bin||'Bin'}
              </button>
              <button
                onClick={dismissPending}
                style={{flex:1,background:'#334155',color:'#94a3b8',border:'none',borderRadius:10,padding:'13px',fontWeight:700,fontSize:14,cursor:'pointer'}}
              >
                Rescan
              </button>
            </div>
          </div>
        )}

        {/* Added flash */}
        {addedFlash && !pending && (
          <div style={{background:'#16a34a',borderRadius:12,padding:'12px 16px',textAlign:'center',color:'#fff',fontWeight:800,fontSize:15,animation:'flashIn .2s ease-out'}}>
            \u2705 Added to {bin}!
          </div>
        )}

        {/* Scanned list */}
        {scanned.length > 0 && (
          <div style={{background:'rgba(255,255,255,.06)',borderRadius:12,overflow:'hidden'}}>
            <div style={{padding:'9px 14px',borderBottom:'1px solid rgba(255,255,255,.08)',color:'#94a3b8',fontSize:12,fontWeight:700}}>
              {scanned.length} item{scanned.length!==1?'s':''} added this session
            </div>
            <div style={{maxHeight:190,overflowY:'auto'}}>
              {scanned.map((it,i)=>(
                <div key={i} style={{padding:'8px 14px',borderBottom:'1px solid rgba(255,255,255,.05)',display:'flex',gap:8,alignItems:'center'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{color:'#e2e8f0',fontWeight:700,fontSize:13}}><span style={{color:'#86efac',fontSize:11}}>REF </span>{it.productNumber}</div>
                    {it.lot&&<div style={{color:'#94a3b8',fontSize:12}}><span style={{color:'#86efac',fontSize:11}}>LOT </span>{it.lot}</div>}
                    {it.expDate&&<div style={{color:'#94a3b8',fontSize:12}}><span style={{color:'#86efac',fontSize:11}}>EXP </span>{fmtDate(it.expDate)}</div>}
                  </div>
                  <span style={{color:'#22c55e',fontSize:15}}>\u2713</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {ready&&!camError&&!pending&&scanned.length===0&&(
          <p style={{color:'#475569',fontSize:13,textAlign:'center',marginTop:4}}>Point camera at barcode to scan</p>
        )}
      </div>
    </div>
  );
}

function AddTab({ onAdd, bins, onStartScan }) {
  // ── Scan session state ───────────────────────────────────────────
  const [scanBin, setScanBin] = useState('');
  const [scanCustomBin, setScanCustomBin] = useState('');

  // ── Manual entry state ───────────────────────────────────────────
  const [barcode,setBarcode] = useState('');
  const [pn,setPn] = useState('');
  const [name,setName] = useState('');
  const [lot,setLot] = useState('');
  const [exp,setExp] = useState('');
  const [manBin,setManBin] = useState('');
  const [manCustomBin,setManCustomBin] = useState('');
  const [qty,setQty] = useState(1);
  const [msg,setMsg] = useState(null);
  const ref = useRef(null);

  const getActiveScanBin = () => scanBin === '__new__' ? scanCustomBin.toUpperCase().trim() : scanBin;
  const getManualBin = () => manBin === '__new__' ? manCustomBin.toUpperCase().trim() : manBin.toUpperCase().trim();

  function handleBarcode(v) {
    setBarcode(v);
    if (v.length > 10) {
      const p = parseBarcode(v);
      const la = lookupProduct(p.gtin14); setPn(la.productNumber || p.gtin14 || ''); setLot(p.lotNumber);
      if (p.expDate) setExp(p.expDate);
      const la2 = lookupProduct(p.gtin14); setName(la2.productName || '');
    }
  }
  function handlePn(v) { setPn(v); setName(CATALOG[v]||''); }
  function submit(e) {
    e.preventDefault();
    if (!pn) { setMsg({t:'e',m:'Product number required.'}); return; }
    onAdd({id:Date.now(),productNumber:pn,productName:name||pn,lot,expDate:exp||null,bin:getManualBin(),qty:Number(qty)||1,addedAt:new Date().toISOString()});
    setBarcode('');setPn('');setName('');setLot('');setExp('');setManBin('');setManCustomBin('');setQty(1);
    setMsg({t:'s',m:`✅ Added: ${name||pn}`});
    setTimeout(()=>setMsg(null),3500);
  }

  return (
    <div>
      {/* ── Camera Scan Section ── */}
      <div className="card">
        <h2 style={{fontWeight:700,marginBottom:4,color:'#1e40af',fontSize:18}}>📷 Scan Multiple Implants</h2>
        <p style={{fontSize:13,color:'#6b7280',marginBottom:14}}>Select a bin, then scan as many implants as you want. Each scan is instantly added.</p>
        <div style={{marginBottom:12}}>
          <label>Select Bin to Scan Into</label>
          <BinSelector value={scanBin} onChange={setScanBin} bins={bins} customValue={scanCustomBin} onCustomChange={setScanCustomBin}/>
        </div>
        <button
          type="button"
          className="btn btn-primary"
          style={{background:'#16a34a',fontSize:16}}
          onClick={()=>{ const b=getActiveScanBin(); if(!b){alert('Please select or create a bin first.');return;} onStartScan(b); }}
        >
          📷 Start Scanning
        </button>
      </div>

      {/* ── Manual Entry Section ── */}
      <div className="card">
        <h2 style={{fontWeight:700,marginBottom:4,color:'#1e40af',fontSize:18}}>✏️ Manual Entry</h2>
        <p style={{fontSize:13,color:'#6b7280',marginBottom:14}}>Add a single implant by typing or scanning one barcode at a time.</p>
        <form onSubmit={submit}>
          <div style={{marginBottom:12}}><label>Barcode</label><input ref={ref} value={barcode} onChange={e=>handleBarcode(e.target.value)} placeholder="Scan or type barcode..."/></div>
          <div className="grid-2" style={{marginBottom:12}}><div><label>REF (Product Number)</label><input value={pn} onChange={e=>handlePn(e.target.value)} placeholder="e.g. 17900"/></div><div><label>Lot Number</label><input value={lot} onChange={e=>setLot(e.target.value)} placeholder="Lot #"/></div></div>
          {name && <div className="alert alert-green" style={{marginBottom:12}}>📦 {name}</div>}
          {pn && !name && <div className="alert alert-yellow" style={{marginBottom:12}}>⚠️ Product not in catalog.</div>}
          <div className="grid-2" style={{marginBottom:12}}><div><label>Expiry Date</label><input type="date" value={exp} onChange={e=>setExp(e.target.value)}/></div><div><label>Quantity</label><input type="number" min="1" value={qty} onChange={e=>setQty(e.target.value)}/></div></div>
          <div style={{marginBottom:getManualBin()||manBin==='__new__'?8:16}}>
            <label>Bin / Location</label>
            <BinSelector value={manBin} onChange={setManBin} customValue={manCustomBin} onCustomChange={setManCustomBin}/>
          </div>
          {msg && <div className={`alert ${msg.t==='e'?'alert-red':'alert-green'}`} style={{marginBottom:12}}>{msg.m}</div>}
          <button type="submit" className="btn btn-primary">Add to Inventory</button>
        </form>
      </div>
    </div>
  );
}

// ── Inventory Tab ─────────────────────────────────────────────────────────────
function InventoryTab({ items, onRemove, onUpdate }) {
  const [search,setSearch] = useState('');
  const [editId,setEditId] = useState(null);
  const [editBin,setEditBin] = useState('');
  const [editQty,setEditQty] = useState(1);
  const filtered = items.filter(i=>[i.productNumber,i.productName,i.lot,i.bin].some(f=>f?.toLowerCase().includes(search.toLowerCase())));
  return (
    <div className="card">
      <h2 style={{fontWeight:700,marginBottom:12,color:'#1e40af',fontSize:18}}>Inventory ({items.length} items)</h2>
      <div className="search-row"><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by product, lot, bin..."/></div>
      {filtered.length===0 ? <div className="empty">{search?'No results found.':'No inventory yet. Add items above.'}</div> : (
        <div style={{overflowX:'auto'}}><table>
          <thead><tr><th>REF</th><th>LOT</th><th>Expiry</th><th>Bin</th><th>Qty</th><th></th></tr></thead>
          <tbody>{filtered.map(item=>(
            <tr key={item.id}>
              <td><div style={{fontWeight:700,fontSize:12,color:'#6b7280',letterSpacing:.5}}>REF</div><div style={{fontWeight:600,fontSize:13}}>{item.productNumber}</div>{item.productName&&item.productName!==item.productNumber&&<div className="product-name">{item.productName}</div>}</td>
              <td>{item.lot||'—'}</td>
              <td>{fmtDate(item.expDate)} <ExpiryBadge d={item.expDate}/></td>
              <td>{editId===item.id?<input value={editBin} onChange={e=>setEditBin(e.target.value)} style={{width:70,padding:'4px 8px'}}/>:(item.bin||'—')}</td>
              <td>{editId===item.id?<input type="number" value={editQty} onChange={e=>setEditQty(e.target.value)} style={{width:55,padding:'4px 8px'}}/>:item.qty}</td>
              <td style={{whiteSpace:'nowrap'}}>
                {editId===item.id
                  ?<button className="btn btn-sm btn-success" onClick={()=>{onUpdate(item.id,{bin:editBin.toUpperCase(),qty:Number(editQty)||1});setEditId(null);}}>💾</button>
                  :<><button className="btn btn-sm btn-secondary" style={{marginRight:4}} onClick={()=>{setEditId(item.id);setEditBin(item.bin||'');setEditQty(item.qty||1);}}>✏️</button><button className="btn btn-sm btn-danger" onClick={()=>{if(confirm('Remove this item?'))onRemove(item.id);}}>🗑</button></>
                }
              </td>
            </tr>
          ))}</tbody>
        </table></div>
      )}
    </div>
  );
}

// ── Bins Tab ──────────────────────────────────────────────────────────────────
function BinsTab({ items, bins, onCreateBin, onDeleteBin }) {
  const [newBin, setNewBin] = useState('');
  const [msg, setMsg] = useState(null);

  // Build map of bin name -> items (from inventory)
  const binItems = {};
  items.forEach(i=>{ const b=i.bin||'Unassigned'; if(!binItems[b]) binItems[b]=[]; binItems[b].push(i); });

  // All bin keys: pre-created bins + bins from inventory
  const allBins = [...new Set([...bins, ...Object.keys(binItems)])].sort();

  function handleCreate(e) {
    e.preventDefault();
    const v = newBin.toUpperCase().trim();
    if (!v) return;
    if (bins.includes(v)) { setMsg('Bin already exists.'); setTimeout(()=>setMsg(null),2000); return; }
    onCreateBin(v);
    setNewBin('');
    setMsg(`✅ Bin "${v}" created.`);
    setTimeout(()=>setMsg(null),2500);
  }

  return (
    <div>
      <div className="card">
        <h3 style={{fontWeight:700,marginBottom:12,color:'#1e40af',fontSize:16}}>Create New Bin</h3>
        <form onSubmit={handleCreate} style={{display:'flex',gap:8}}>
          <input value={newBin} onChange={e=>setNewBin(e.target.value)} placeholder="Bin name (e.g. OR-1, A2, SHELF-3)" style={{flex:1}}/>
          <button type="submit" className="btn btn-primary" style={{width:'auto',padding:'11px 20px'}}>＋ Create</button>
        </form>
        {msg && <div className="alert alert-green" style={{marginTop:10}}>{msg}</div>}
      </div>

      {allBins.length === 0 && <div className="card"><div className="empty">No bins yet. Create one above.</div></div>}

      {allBins.map(binName=>{
        const list = binItems[binName] || [];
        const isEmpty = list.length === 0;
        const isPreCreated = bins.includes(binName);
        return (
          <div key={binName} style={{marginBottom:16}}>
            <div className="bin-header" style={{background: isEmpty ? '#475569' : '#1e40af'}}>
              <span>📦 {binName} <span className="badge" style={{background:'rgba(255,255,255,.25)',color:'#fff',marginLeft:6}}>{list.length} items</span></span>
              {isEmpty && isPreCreated && <button onClick={()=>{ if(confirm(`Delete empty bin "${binName}"?`)) onDeleteBin(binName); }} style={{background:'none',border:'1px solid rgba(255,255,255,.5)',color:'#fff',borderRadius:6,padding:'3px 10px',cursor:'pointer',fontSize:12}}>Delete</button>}
            </div>
            <div className="bin-body">
              {isEmpty
                ? <div style={{padding:'16px',color:'#94a3b8',textAlign:'center',fontSize:13}}>Empty bin — scan implants and assign to this bin.</div>
                : <table>
                    <thead><tr><th>REF</th><th>LOT</th><th>Expiry</th><th>Qty</th></tr></thead>
                    <tbody>{list.map(item=>(
                      <tr key={item.id}><td><div style={{fontWeight:700,fontSize:11,color:'#6b7280',letterSpacing:.5}}>REF</div><div style={{fontWeight:600}}>{item.productNumber}</div>{item.productName&&item.productName!==item.productNumber&&<div className="product-name">{item.productName}</div>}</td><td>{item.lot||'—'}</td><td>{fmtDate(item.expDate)} <ExpiryBadge d={item.expDate}/></td><td>{item.qty}</td></tr>
                    ))}</tbody>
                  </table>
              }
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Alerts Tab ─────────────────────────────────────────────────────────────────
function AlertsTab({ items }) {
  const expired=items.filter(i=>i.expDate&&daysUntil(i.expDate)<0);
  const s30=items.filter(i=>i.expDate&&daysUntil(i.expDate)>=0&&daysUntil(i.expDate)<=30);
  const s90=items.filter(i=>i.expDate&&daysUntil(i.expDate)>30&&daysUntil(i.expDate)<=90);
  function Group({title,emoji,list,cls}) {
    if(!list.length) return null;
    return (<div className="card"><h3 style={{fontWeight:700,marginBottom:12,color:'#1e40af'}}>{emoji} {title} <span className={`badge ${cls}`}>{list.length}</span></h3>
      <div style={{overflowX:'auto'}}><table><thead><tr><th>REF</th><th>LOT</th><th>Expiry</th><th>Bin</th><th>Days Left</th></tr></thead>
      <tbody>{list.map(i=>(<tr key={i.id}><td><div style={{fontWeight:700,fontSize:11,color:'#6b7280',letterSpacing:.5}}>REF</div><div style={{fontWeight:600}}>{i.productNumber}</div>{i.productName&&i.productName!==i.productNumber&&<div className="product-name">{i.productName}</div>}</td><td>{i.lot||'—'}</td><td>{fmtDate(i.expDate)}</td><td>{i.bin||'—'}</td><td style={{fontWeight:700,color:daysUntil(i.expDate)<0?'#dc2626':'#d97706'}}>{daysUntil(i.expDate)}</td></tr>))}</tbody></table></div>
    </div>);
  }
  return (<div>
    {!expired.length&&!s30.length&&!s90.length&&<div className="card"><div className="empty">✅ No expiration alerts. All items look good!</div></div>}
    <Group title="Expired" emoji="🚨" list={expired} cls="badge-red"/>
    <Group title="Expiring within 30 days" emoji="⚠️" list={s30} cls="badge-red"/>
    <Group title="Expiring within 90 days" emoji="📅" list={s90} cls="badge-yellow"/>
  </div>);
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [token, setToken] = useState(null);
  const [data, setData] = useState({ inventory: [], bins: [] });
  const [activeTab, setActiveTab] = useState('add');
  const [syncStatus, setSyncStatus] = useState('ok');
  const [syncMsg, setSyncMsg] = useState('');
  const [loginLoading, setLoginLoading] = useState(false);
  const [loginError, setLoginError] = useState('');
  const [initialized, setInitialized] = useState(false);
  const saveTimer = useRef(null);
  const didInit = useRef(false);

  // Handle MSAL redirect on page load
  useEffect(()=>{
    (async()=>{
      const client = getMsal();
      await client.initialize();
      try { await client.handleRedirectPromise(); } catch(e) {}
      const t = await getToken();
      if (t) { setToken(t); await loadData(t); }
      setInitialized(true);
    })();
  }, []);

  async function loadData(t) {
    setSyncStatus('pending'); setSyncMsg('Loading from OneDrive...');
    try {
      const d = await readOneDrive(t);
      if (d && d.inventory) setData({bins:[], ...d});
      else setData({ inventory: [], bins: [] });
      setSyncStatus('ok'); setSyncMsg('Synced with OneDrive ✓');
    } catch(e) {
      setSyncStatus('error'); setSyncMsg('Load failed: '+e.message);
    }
  }

  useEffect(()=>{
    if (!token || !didInit.current) { if (token) didInit.current=true; return; }
    clearTimeout(saveTimer.current);
    setSyncStatus('pending'); setSyncMsg('Saving to OneDrive...');
    saveTimer.current = setTimeout(async()=>{
      try {
        let t = token;
        try { const fresh = await getToken(); if (fresh) t=fresh; } catch{}
        await writeOneDrive(t, data);
        setSyncStatus('ok'); setSyncMsg('Saved to OneDrive ✓');
      } catch(e) { setSyncStatus('error'); setSyncMsg('Save failed: '+e.message); }
    }, 1000);
  }, [data]);

  async function handleLogin() {
    setLoginLoading(true); setLoginError('');
    try {
      const t = await signIn();
      if (t) { setToken(t); didInit.current=true; await loadData(t); }
    } catch(e) { setLoginError(e.message||'Sign-in failed. Try again.'); }
    setLoginLoading(false);
  }

  async function handleSignOut() {
    if (!confirm('Sign out?')) return;
    await signOut(); setToken(null); setData({inventory:[]}); didInit.current=false;
  }

  // Scanner lives at App level so it survives tab switches
  const [scanning, setScanning] = useState(false);
  const [scanBinActive, setScanBinActive] = useState('');

  function addItem(item) { setData(d=>({...d,inventory:[item,...d.inventory]})); setActiveTab('bins'); }
  function addItemFromScan(item) { setData(d=>({...d,inventory:[item,...d.inventory]})); } // no tab switch
  function removeItem(id) { setData(d=>({...d,inventory:d.inventory.filter(i=>i.id!==id)})); }
  function updateItem(id,u) { setData(d=>({...d,inventory:d.inventory.map(i=>i.id===id?{...i,...u}:i)})); }
  function createBin(name) { setData(d=>({...d,bins:[...d.bins.filter(b=>b!==name),name].sort()})); }
  function deleteBin(name) { setData(d=>({...d,bins:d.bins.filter(b=>b!==name)})); }
  function startScan(bin) { setScanBinActive(bin); setScanning(true); }
  function stopScan() { setScanning(false); setActiveTab('add'); }

  if (!initialized) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',flexDirection:'column',gap:12}}><img src={LOGO_URI} style={{height:48,opacity:.7}}/><p style={{color:'#94a3b8'}}>Loading...</p></div>;
  if (!token) return <LoginScreen onLogin={handleLogin} loading={loginLoading} error={loginError}/>;

  const alertCount = data.inventory.filter(i=>i.expDate&&daysUntil(i.expDate)<=30).length;
  const tabs = [
    {id:'add',label:'➕ Add'},
    {id:'inventory',label:`📋 Inventory${data.inventory.length?` (${data.inventory.length})`:''}` },
    {id:'bins',label:'📦 Bins'},
    {id:'alerts',label:`🚨 Alerts${alertCount?` (${alertCount})`:''}` },
  ];

  return (
    <div>
      {/* Scanner overlay at App level — survives tab switches */}
      {scanning && <BarcodeScanner bin={scanBinActive} onAdd={addItemFromScan} onClose={stopScan}/>}

      <div className="header">
        <img src={LOGO_URI} alt="OsteoSolutions" style={{height:40}}/>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div className="sync-bar" style={{marginBottom:0,boxShadow:'none',background:'transparent',padding:'0',fontSize:12}}>
            <div className={`sync-dot ${syncStatus}`}></div>
            <span style={{color:'#6b7280'}}>{syncMsg||'OneDrive'}</span>
          </div>
          <button className="btn btn-secondary btn-sm" onClick={handleSignOut}>Sign Out</button>
        </div>
      </div>
      <div className="tabs">{tabs.map(t=><div key={t.id} className={`tab${activeTab===t.id?' active':''}`} onClick={()=>setActiveTab(t.id)}>{t.label}</div>)}</div>
      {activeTab==='add'&&<AddTab onAdd={addItem} bins={data.bins||[]} onStartScan={startScan}/>}
      {activeTab==='inventory'&&<InventoryTab items={data.inventory||[]} onRemove={removeItem} onUpdate={updateItem}/>}
      {activeTab==='bins'&&<BinsTab items={data.inventory||[]} bins={data.bins||[]} onCreateBin={createBin} onDeleteBin={deleteBin}/>}
      {activeTab==='alerts'&&<AlertsTab items={data.inventory||[]}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
